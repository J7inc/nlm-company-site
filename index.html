<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Landscape Management — Commercial Landscaping · Myrtle Beach, SC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700&family=Jost:wght@300;400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--deep:#0b1c13;--mid:#1a3a2a;--gold:#c9a84c;--cream:#faf8f4}
body{font-family:"Jost",sans-serif;background:var(--deep);color:var(--cream);min-height:100vh;display:flex;flex-direction:column}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:64px 24px}
.hero h1{font-family:"Cormorant Garamond",serif;font-size:clamp(36px,6vw,64px);font-weight:400;letter-spacing:0.04em;color:var(--cream);margin-bottom:16px}
.hero .gold{color:var(--gold)}
.hero .tagline{font-size:14px;font-weight:300;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:48px}
.hero .phone{font-family:"Cormorant Garamond",serif;font-size:28px;color:var(--gold);text-decoration:none;letter-spacing:0.05em;margin-bottom:12px;display:block}
.hero .phone:hover{color:#dfc070}
.hero .email{font-size:14px;color:rgba(255,255,255,0.35);text-decoration:none}
.hero .email:hover{color:var(--gold)}
.divider{width:60px;height:1px;background:rgba(201,168,76,0.3);margin:32px auto}
footer{background:rgba(0,0,0,0.2);padding:24px 64px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(201,168,76,0.08)}
.footer-logo{font-family:"Cormorant Garamond",serif;font-size:14px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold)}
.footer-links{display:flex;gap:24px;list-style:none}
.footer-links a{font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.25);text-decoration:none}
.footer-links a:hover{color:var(--gold)}
.footer-copy{font-size:11px;color:rgba(255,255,255,0.15)}
@media(max-width:768px){footer{flex-direction:column;gap:16px;text-align:center;padding:24px}}
</style>
</head>
<body>
<div class="hero">
  <h1>National Landscape<br><span class="gold">Management</span></h1>
  <div class="tagline">Commercial Landscaping &nbsp;·&nbsp; Myrtle Beach, SC</div>
  <div class="divider"></div>
  <a href="tel:8439600211" class="phone">(843) 960-0211</a>
  <a href="mailto:info@accessnlm.com" class="email">info@accessnlm.com</a>
</div>
<footer>
  <div class="footer-logo">NLM</div>
  <ul class="footer-links">
    <li><a href="/privacy">Privacy Policy</a></li>
    <li><a href="/terms">Terms</a></li>
  </ul>
  <div class="footer-copy">© 2026 National Landscape Management LLC</div>
</footer>
</body>
</html>
